<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bus Schedule</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div id="schedule">
        <div id="info"><span class="info">Not Connected</span></div>
        <div id="controls">
            <input id="depart" type="button" value="Depart">
            <input id="arrive" type="button" value="Arrive" disabled>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        result.then(r => {
            document.getElementById('depart').addEventListener('click', () => r.depart());
            document.getElementById('arrive').addEventListener('click', () => r.arrive());
        });
    </script>
</body>

</html>
